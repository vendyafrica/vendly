services:
  - type: web
    name: vendly-api
    runtime: node
    plan: free # or starter
    region: oregon # or your preferred region

    # ---------------------------------------------------------
    # BUILD & START COMMANDS
    # ---------------------------------------------------------
    # 1. Install all dependencies using pnpm
    # 2. Use turbo to build ONLY the api and its internal dependencies
    buildCommand: pnpm install && pnpm build --filter @vendly/api

    # Run the compiled server file from the root
    startCommand: node apps/api/dist/server.js

    # ---------------------------------------------------------
    # BUILD FILTERS (Monorepo Optimization)
    # ---------------------------------------------------------
    # Only deploy if files in api or shared packages change.
    # We explicitly ignore the other Next.js apps to save build minutes.
    buildFilter:
      paths:
        - apps/api/**
        - packages/**
        - package.json
        - pnpm-lock.yaml
        - turbo.json
      ignoredPaths:
        - apps/web/**
        - apps/storefront/**
        - apps/admin/**
        - README.md

    # ---------------------------------------------------------
    # ENVIRONMENT VARIABLES
    # ---------------------------------------------------------
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
   